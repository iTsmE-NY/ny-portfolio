    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {

    }

    /* 레이아웃 */
    .page { padding: 40px 25%; position: relative; z-index: 1; }
    @media (max-width: 1279px) { .page { padding: 28px 10%; } }

    /* 헤더 */
    .site-title {
      font-size: clamp(36px, 5.5vw, 50px); font-weight: 900;
      letter-spacing: -1.5px; text-align: center; text-transform: uppercase;
      margin-bottom: 64px; line-height: 1;
    }
    .site-sub, .site-hint {
      font-size: clamp(11px, 1.4vw, 14px); font-weight: 400;
      letter-spacing: 0.5px; text-align: right; opacity: 0.55;
    }
    .site-sub  { margin-top: -19px; margin-bottom: 2px; }
    .site-hint { margin-bottom: 20px; }

    /* 오선보 행 */
    .staff-row { margin-bottom: 56px; }
    .staff-outer {
      position: relative; left: 50%; transform: translateX(-50%);
      width: 100vw; height: var(--wrap-h);
    }
    .click-hint {
      position: absolute; top: -5px; font-size: 9px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--mint); opacity: 0.55; white-space: nowrap; pointer-events: none;
    }
    .staff-lines { position: absolute; left: 0; right: 0; top: var(--pad); pointer-events: none; }
    .sl { position: absolute; left: 0; right: 0; height: 1.5px; background: var(--gray); opacity: 0.58; }
    .sl:nth-child(1) { top: 0; }
    .sl:nth-child(2) { top: calc(var(--line-gap) * 1); }
    .sl:nth-child(3) { top: calc(var(--line-gap) * 2); }
    .sl:nth-child(4) { top: calc(var(--line-gap) * 3); }
    .sl:nth-child(5) { top: calc(var(--line-gap) * 4); }
    .barline {
      position: absolute; top: var(--pad); height: var(--staff-h);
      width: 1px; background: var(--mint); opacity: 0.3; pointer-events: none;
    }
    .beam { position: absolute; height: 3px; background: var(--mint); pointer-events: none; z-index: 5; }

    /* 음표 */
    .note {
      position: absolute; width: 8px; height: 8px;
      overflow: visible; cursor: pointer; z-index: 10;
      color: var(--mint); transition: color 0.15s;
    }
    .note:hover, .note.is-active { color: var(--gray); }
    .note[data-id="profile"] { color: var(--yellow); }
    .note::before {
      content: attr(data-label);
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      font-size: 9px; font-weight: 600; letter-spacing: 1px;
      color: var(--bg); background: var(--mint);
      padding: 4px 10px; white-space: nowrap; pointer-events: none;
      opacity: 0; transition: opacity 0.15s; z-index: 20;
    }
    .note:hover::before { opacity: 1; }
    .note::after { content: ''; position: absolute; inset: -5px; }
    @keyframes notePop {
      0%   { transform: scale(1); }   35%  { transform: scale(1.7); }
      70%  { transform: scale(.85); } 100% { transform: scale(1); }
    }
    .note.popping { animation: notePop 0.26s ease forwards; }

    /* 아코디언 */
    .acc-group { position: relative; left: 50%; transform: translateX(-50%); width: 100vw; }
    .accordion { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.44s cubic-bezier(0.4,0,0.2,1); }
    .accordion.is-open { grid-template-rows: 1fr; }
    .accordion-inner { overflow: hidden; }
    .accordion-body { padding: 18px 25vw 8px; }
    @media (max-width: 1279px) { .accordion-body { padding: 15px 10vw 8px; } }

    /* 프로필 카드 */
    .profile-name { font-size: 36px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; margin-bottom: 6px; }
    .profile-role { font-size: 9.5px; font-weight: 700; letter-spacing: 3.5px; text-transform: uppercase; color: var(--gray); margin-bottom: 14px; }
    .profile-bio  { font-size: 13px; line-height: 1.72; margin-bottom: 14px; color: var(--gray); }
    .profile-links {
      display: flex; flex-wrap: wrap; gap: 4px 2px;
      font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 22px;
    }
    .profile-links a { color: var(--mint-bright); text-decoration: none; border-bottom: 1px solid rgba(41,240,170,0.5); padding-bottom: 1px; transition: opacity 0.15s; }
    .profile-links a:hover { opacity: 0.65; }
    .profile-links .sep { color: var(--mint); opacity: 0.45; padding: 0 6px; }

    .acc-title { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; margin-bottom: 4px; }
    .acc-sub   { font-size: 12px; font-style: italic; color: var(--gray); margin-bottom: 12px; }
    .acc-desc  { font-size: 13px; line-height: 1.74; margin-bottom: 14px; color: var(--gray); }

    .acc-images {

    .acc-image {

    }

    .acc-image span { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); opacity: 0.5; }
  </style>
</head>

// SVG 음표 (8×8 사각형 머리, 기둥 위로)
function noteSVG(type, hasLedger) {
  const stem   = `<line x1="8" y1="-5" x2="8" y2="-35" stroke="currentColor" stroke-width="1.5" fill="none"/>`;
  const ledger = hasLedger ? `<line x1="-4.4" y1="4" x2="12.4" y2="4" stroke="currentColor" stroke-width="1.5" fill="none"/>` : '';
  const extra  = type === 'dq' ? `<rect x="11.5" y="2.5" width="3" height="3" fill="currentColor"/>`
               : type === 'e'  ? `<polyline points="8,-35 18,-35 18,-15" stroke="currentColor" stroke-width="1.5" fill="none"/>` : '';
  return `<svg width="8" height="8" viewBox="0 0 8 8" style="overflow:visible;position:absolute;top:0;left:0;display:block" fill="currentColor"><rect width="8" height="8"/>${stem}${extra}${ledger}</svg>`;
}

// 프로필 카드 HTML
function profileBodyHTML(p) {
  const links = p.socials.map(s => `<span class="sep">·</span><a href="${s.href}">${s.label}</a>`).join('');
  return `<p class="profile-name">${p.name}</p>
    <p class="profile-role">${p.role}</p>
    <p class="profile-bio">${p.bio}</p>
    <div class="profile-links"><a href="mailto:${p.email}">${p.email}</a>${links}</div>`;
}

// 프로젝트 카드 HTML
function projectBodyHTML(p) {
  const imgs = p.images && p.images.length
    ? p.images.map(src => `<div class="acc-image"><img src="${src}" alt="${p.title}"></div>`).join('')
    : `<div class="acc-image"><span>Preparing...</span></div>`;
  return `<p class="acc-title">${p.title}</p>
    <p class="acc-sub">${p.sub}</p>
    <p class="acc-desc">${p.desc}</p>
    <div class="acc-images">${imgs}</div>`;
}

// 반응형 브레이크포인트
let _mobile, LEFT_PCT, RIGHT_PCT;
function computeBreakpoints() {
  _mobile   = window.matchMedia('(max-width: 768px)').matches;
  LEFT_PCT  = window.matchMedia('(min-width: 1280px)').matches ? 25 : _mobile ? 5 : 10;
  RIGHT_PCT = window.matchMedia('(min-width: 1280px)').matches ? 75 : _mobile ? 90 : 90;
}
function rTop(t) { return _mobile ? Math.round(-1.2 + t * 0.8) : t; }
function noteLeftPct(i, n) {
  return n === 1 ? (LEFT_PCT + RIGHT_PCT) / 2 : LEFT_PCT + (i / (n - 1)) * (RIGHT_PCT - LEFT_PCT);
}

// 오선보 행 생성
const SL5 = '<div class="sl"></div>'.repeat(5);
function buildRow(rowNotes, beamPairs, barlines, label) {
  const n = rowNotes.length;
  let notesHTML = '', accsHTML = '', blHTML = '', beamsHTML = '';

  rowNotes.forEach((note, i) => {
    const left = noteLeftPct(i, n).toFixed(2) + '%';
    const top  = rTop(note.top) + 'px';
    const { id } = note.content;
    const lbl    = note.content.name || note.content.title;
    notesHTML += `<div class="note" data-id="${id}" data-label="${lbl}" data-top="${note.top}" style="left:${left};top:${top}">${noteSVG(note.type, note.ledger)}</div>`;
    const body    = id === 'profile' ? profileBodyHTML(note.content) : projectBodyHTML(note.content);
    accsHTML     += `<div class="accordion" id="acc-${id}"><div class="accordion-inner"><div class="accordion-body">${body}</div></div></div>`;
  });

  barlines.forEach(i => {
    const x = ((noteLeftPct(i, n) + noteLeftPct(i + 1, n)) / 2).toFixed(2) + '%';
    blHTML += `<div class="barline" style="left:${x}"></div>`;
  });
  blHTML += `<div class="barline" style="left:${(noteLeftPct(n - 1, n) + 3).toFixed(2)}%"></div>`;

  beamPairs.forEach(([i, j]) => {
    const lPct = noteLeftPct(i, n), rPct = noteLeftPct(j, n);
    const top  = rTop(rowNotes[i].top) - 36;
    beamsHTML += `<div class="beam" style="left:calc(${lPct.toFixed(2)}% + 8px);right:calc(${(100 - rPct).toFixed(2)}% - 8px);top:${top}px"></div>`;
  });

  const row = document.createElement('div');
  row.className = 'staff-row';
  row.innerHTML = `
    <div class="staff-outer">
      <span class="click-hint" style="left:${LEFT_PCT}%">${label || 'Design.'}</span>
      <div class="staff-lines">${SL5}</div>
      ${blHTML}${beamsHTML}${notesHTML}
    </div>
    <div class="acc-group">${accsHTML}</div>`;
  return row;
}

// 악보 전체 렌더링
const score = document.getElementById('js-score');
function buildScore() {
  computeBreakpoints();
  score.innerHTML = '';
  score.appendChild(buildRow(MELODY_ROWS[0], [[7,8],[10,11]], [3,6,9]));
  score.appendChild(buildRow(MELODY_ROWS[1], [[7,8]],         [3,6,9], 'Illust.'));
  score.appendChild(buildRow(MELODY_ROWS[2], [],              [3,6,9], 'Illust.'));
  score.appendChild(buildRow(MELODY_ROWS[3], [],              [3,6,9], 'Design.'));

  // 마지막 빈 오선보
  const empty = document.createElement('div');
  empty.className = 'staff-row';
  empty.style.marginBottom = '5px';
  empty.innerHTML = `<div class="staff-outer"><div class="staff-lines">${SL5}</div></div>`;
  score.appendChild(empty);
}

buildScore();
window.matchMedia('(min-width: 1280px)').addEventListener('change', buildScore);
window.matchMedia('(max-width: 768px)').addEventListener('change', buildScore);

// 음표 소리 재생 (Web Audio API — 마림바 + 3도·8도 화음)
const NOTE_FREQ  = { 54: 392.00, 60: 349.23, 64: 329.63, 69: 293.66, 74: 261.63 }; // 솔·파·미·레·도
const THIRD_FREQ = { 54: 493.88, 60: 440.00, 64: 392.00, 69: 349.23, 74: 329.63 }; // 시·라·솔·파·미
let audioCtx = null;

function synthMarimba(freq, volume, now, master) {
  // 마림바: 기음(sine) + 4배음 강조, 빠른 감쇠
  const harmonics = [
    { ratio: 1,   gain: 0.7  },
    { ratio: 4,   gain: 0.15 },
  ];
  harmonics.forEach(({ ratio, gain: gVal }) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq * ratio;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(gVal * volume, now + 0.002);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
    osc.connect(gain);
    gain.connect(master);
    osc.start(now);
    osc.stop(now + 0.5);
  });
}

function synthSine(freq, volume, now, master) {
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(volume, now + 0.002);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
  osc.connect(gain);
  gain.connect(master);
  osc.start(now);
  osc.stop(now + 0.5);
}

function playNote(topPx) {
  const freq      = NOTE_FREQ[topPx];
  const thirdFreq = THIRD_FREQ[topPx];
  if (!freq) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const now    = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.value = 0.9;
  master.connect(audioCtx.destination);
  synthMarimba(freq,          1.0, now, master); // 기음 (마림바)
  synthSine(thirdFreq,        0.3, now, master); // 3도 화음 (사인)
  synthSine(freq * 2,         0.3, now, master); // 8도 화음 (사인)
}

// 아코디언 클릭
score.addEventListener('click', e => {
  const note = e.target.closest('.note[data-id]');
  if (!note) return;
  const id     = note.dataset.id;
  const acc    = document.getElementById('acc-' + id);
  const isOpen = acc.classList.contains('is-open');
  document.querySelectorAll('.accordion.is-open').forEach(a => a.classList.remove('is-open'));
  document.querySelectorAll('.note.is-active').forEach(n => n.classList.remove('is-active'));
  if (!isOpen) {
    acc.classList.add('is-open');
    note.classList.add('is-active');
  }
  if (!isOpen) playNote(parseInt(note.dataset.top, 10));
  note.classList.add('popping');
  note.addEventListener('animationend', () => note.classList.remove('popping'), { once: true });
});

// 이미지 클릭/터치 네비게이션 (좌측 → 이전, 우측 → 다음)
document.addEventListener('click', e => {
  const strip = e.target.closest('.acc-images');
  if (!strip) return;
  const img = strip.querySelector('.acc-image');
  if (!img) return;
  const step = img.offsetWidth + 12;
  const index = Math.round(strip.scrollLeft / step);
  const clickedLeft = e.clientX < strip.getBoundingClientRect().left + strip.offsetWidth / 2;
  const target = (clickedLeft ? index - 1 : index + 1) * step;
  strip.scrollTo({ left: Math.max(0, target), behavior: 'smooth' });
});

document.addEventListener('contextmenu', e => {
  if (e.target.tagName === 'IMG') e.preventDefault();
});
